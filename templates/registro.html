<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Yamitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#8B6F47">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/app-icon-192.png') }}">

</head>
<body class="bg-light">

<header class="navbar-custom">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center">
                <h1 class="h4 mb-0">Registro</h1>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-link btn-icon btn-zoom-minus" title="Achicar">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="btn btn-link btn-icon btn-zoom-plus" title="Agrandar">
                    <i class="fas fa-plus"></i>
                </button>
                <a href="{{ url_for('index') }}" class="btn btn-outline-primary btn-sm">Volver al Inicio</a>
            </div>
        </div>
    </div>
</header>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4 fw-bold">Crear Cuenta</h2>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ username|default('') }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ email|default('') }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 py-2 mb-3">Registrarse</button>
                    </form>

                    <p class="text-center text-muted">
                        ¿Ya tienes cuenta? <a href="{{ url_for('login') }}" class="text-primary fw-bold">Inicia sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const ZOOM_STEP = 0.1;
    const MIN_ZOOM = 0.8;
    const MAX_ZOOM = 2;

    function initZoom() {
        const currentZoom = parseFloat(localStorage.getItem('pageZoom')) || 1;
        applyZoom(currentZoom);
    }

    function applyZoom(zoomLevel) {
        zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel));
        document.body.style.zoom = zoomLevel;
        localStorage.setItem('pageZoom', zoomLevel);
    }

    function zoomIn() {
        const currentZoom = parseFloat(document.body.style.zoom) || 1;
        applyZoom(currentZoom + ZOOM_STEP);
    }

    function zoomOut() {
        const currentZoom = parseFloat(document.body.style.zoom) || 1;
        applyZoom(currentZoom - ZOOM_STEP);
    }

    document.querySelectorAll('.btn-zoom-plus').forEach(btn => {
        btn.addEventListener('click', zoomIn);
    });

    document.querySelectorAll('.btn-zoom-minus').forEach(btn => {
        btn.addEventListener('click', zoomOut);
    });

    window.addEventListener('load', initZoom);
</script>
    <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
</body>
</html>
