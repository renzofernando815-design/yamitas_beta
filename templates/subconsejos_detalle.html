<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subconsejos.titulo }} - Yamitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#8B6F47">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/app-icon-192.png') }}">
</head>
<body>

<header class="navbar-custom">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center">
                <a href="{{ url_for('consejo_detalle', consejo_id=consejo.id) }}" class="text-decoration-none d-flex align-items-center">
                    <i class="fas fa-arrow-left text-dark me-2"></i>
                    <h1 class="h4 mb-0">{{ subconsejos.titulo }}</h1>
                </a>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-link btn-icon btn-zoom-minus" title="Achicar">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="btn btn-link btn-icon btn-zoom-plus" title="Agrandar">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <a href="{{ url_for('index') }}" class="btn btn-outline-primary btn-sm">Volver al Inicio</a>
        </div>
    </div>
</header>

<div class="container py-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    {% if subconsejos.imagen %}
                        <div class="mb-3">
                            <img src="{{ url_for('static', filename=subconsejos.imagen) }}" alt="{{ subconsejos.titulo }}" class="img-fluid rounded" style="max-height: 400px; object-fit: cover;">
                        </div>
                    {% endif %}
                    
                    <div class="card-text text-muted">
                        {{ subconsejos.contenido | safe }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% include "_footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const ZOOM_STEP = 0.1;
    const MIN_ZOOM = 0.8;
    const MAX_ZOOM = 2;

    function initZoom() {
        let currentZoom = parseFloat(localStorage.getItem('pageZoom')) || 1;
        applyZoom(currentZoom);
    }

    function applyZoom(zoomLevel) {
        zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel));
        document.body.style.zoom = zoomLevel;
        localStorage.setItem('pageZoom', zoomLevel);
    }

    function zoomIn() {
        let currentZoom = parseFloat(document.body.style.zoom) || 1;
        applyZoom(currentZoom + ZOOM_STEP);
    }

    function zoomOut() {
        let currentZoom = parseFloat(document.body.style.zoom) || 1;
        applyZoom(currentZoom - ZOOM_STEP);
    }

    document.querySelectorAll('.btn-zoom-plus').forEach(btn => {
        btn.addEventListener('click', zoomIn);
    });

    document.querySelectorAll('.btn-zoom-minus').forEach(btn => {
        btn.addEventListener('click', zoomOut);
    });

    window.addEventListener('load', initZoom);
    initZoom();
</script>
<script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
</body>
</html>
