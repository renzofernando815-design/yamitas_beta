<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferias - Yamitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#8B6F47">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/app-icon-192.png') }}">

</head>
<body>

<header class="navbar-custom">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center">
                <a href="{{ url_for('index') }}" class="text-decoration-none d-flex align-items-center">
                    <i class="fas fa-arrow-left text-dark me-2"></i>
                    <h1 class="h4 mb-0">Próximas Ferias</h1>
                </a>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-link btn-icon btn-zoom-minus" title="Achicar">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="btn btn-link btn-icon btn-zoom-plus" title="Agrandar">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <a href="{{ url_for('index') }}" class="btn btn-outline-primary btn-sm">Volver al Inicio</a>
        </div>
    </div>
</header>

<div class="container py-5">
    <div class="ferias-main">
        <section class="calendar-panel">
            <div class="calendar-header">
                <button type="button" class="prev-month">Anterior</button>
                <span class="month-label"></span>
                <button type="button" class="next-month">Siguiente</button>
            </div>
            <div class="calendar-grid calendar-weekdays">
                <div>Lun</div>
                <div>Mar</div>
                <div>Mié</div>
                <div>Jue</div>
                <div>Vie</div>
                <div>Sáb</div>
                <div>Dom</div>
            </div>
            <div class="calendar-grid calendar-days"></div>

            <div class="event-panel mt-4">
                <h4>Eventos del día</h4>
                <div class="event-list"></div>
            </div>
        </section>

        <section class="event-panel">
            <h4>Registrar nueva feria o evento</h4>
            {% if not authenticated %}
            <div class="auth-notice">
                Inicia sesión para registrar eventos futuros.
            </div>
            {% endif %}

            <form id="event-form" class="event-form{% if not authenticated %} disabled-form{% endif %}" method="POST" action="{{ url_for('ferias') }}">
                <script type="application/json" id="eventos-json">{{ eventos_json | tojson | safe }}</script>
                <div class="event-form-group">
                    <label for="nombre">Nombre del evento</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre de la feria"{% if not authenticated %} disabled{% endif %} required>
                </div>
                <div class="event-form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" placeholder="Descripción breve"{% if not authenticated %} disabled{% endif %}></textarea>
                </div>
                <div class="event-form-group">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" name="fecha" min="{{ min_date }}"{% if not authenticated %} disabled{% endif %} required>
                </div>
                <div class="event-form-group">
                    <label for="ubicacion">Ubicación</label>
                    <input type="text" id="ubicacion" name="ubicacion" placeholder="Ciudad o lugar"{% if not authenticated %} disabled{% endif %}>
                </div>
                <button type="submit" class="btn btn-primary"{% if not authenticated %} disabled{% endif %}>Registrar evento</button>
            </form>
        </section>
    </div>
</div>

{% include "_footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/ferias_calendar.js') }}"></script>
<script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
</body>
</html>
